# /etc/nginx/sites-available/supersdr
#
# Place this file at the path above and enable it with:
#   sudo ln -s /etc/nginx/sites-available/supersdr /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo nginx -s reload
#
# Assumes the app container exposes port 3000 on the host (see docker-compose.yml).
# server_name _ accepts any host — useful when you don't have a domain yet
# and only want to reach the API by VPS IP.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Webhook payloads from WhatsApp providers are small — keep an explicit cap
    # to fail loud on garbage instead of soaking up uploads.
    client_max_body_size 1m;

    # Reasonable timeouts for our "ack first" pattern (the endpoint should
    # respond in <100ms; long timeouts only matter if something is wedged).
    proxy_connect_timeout 5s;
    proxy_send_timeout    15s;
    proxy_read_timeout    30s;

    # Health probe — public, useful for uptime monitors.
    location = /health {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }

    # All webhook traffic.
    location /webhooks/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default: 404 anything else (the app is webhook-only, no UI).
    location / {
        return 404;
    }
}
