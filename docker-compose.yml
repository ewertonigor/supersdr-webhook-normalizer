services:
  postgres:
    image: postgres:16-alpine
    container_name: supersdr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-supersdr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersdr}
      POSTGRES_DB: ${POSTGRES_DB:-supersdr}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supersdr} -d ${POSTGRES_DB:-supersdr}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supersdr-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER:-supersdr}:${POSTGRES_PASSWORD:-supersdr}@postgres:5432/${POSTGRES_DB:-supersdr}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-2000}
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-10}
      WORKER_MAX_ATTEMPTS: ${WORKER_MAX_ATTEMPTS:-3}
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  postgres-data:
